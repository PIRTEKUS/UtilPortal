{% extends "base.html" %}
{% block title %}Sign In{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5">
        <div class="card shadow-lg border-secondary">
            <div class="card-header bg-dark text-center border-secondary py-4">
                <i class="bi bi-shield-lock-fill display-4 text-primary"></i>
                <h3 class="mt-2 fw-bold">Sign In to UtilPortal</h3>
                <p class="text-muted mb-0">Self-Service IT Utilities</p>
            </div>
            <div class="card-body bg-dark">
                <form action="{{ url_for('auth.login') }}" method="post" class="needs-validation" novalidate>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-secondary border-secondary"><i
                                    class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control" id="email" name="email" required autofocus
                                placeholder="name@company.com">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-secondary border-secondary"><i
                                    class="bi bi-key"></i></span>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                    </div>

                    <div class="d-grid gap-2 mb-3">
                        <button class="btn btn-primary" type="submit">
                            Sign In
                        </button>
                    </div>

                    <div class="text-center text-muted mb-3">
                        <small>— OR —</small>
                    </div>

                    <div class="d-grid gap-2">
                        <a href="{{ url_for('auth.login_sso') }}" class="btn btn-outline-secondary">
                            <i class="bi bi-microsoft"></i> Sign in with Microsoft
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
